<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Farmer Story</title>
<link rel="stylesheet" href="assets/css/farmer.css"/>
</head>
<body>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero-overlay">
    <h1 id="farmerNameHero"></h1>
  </div>
</section>

<!-- STORY -->
<section class="story-section">
  <div class="container">
    <h2>The Story</h2>
    <p id="farmerStory"></p>
  </div>
</section>

<!-- PROFILE -->
<section class="profile-section">
  <div class="container profile-grid">
    <div class="profile-info" id="farmerProfile"></div>

    <div class="gallery">
      <img id="img0"/>
      <img id="img2"/>
      <img id="img3"/>
    </div>
  </div>
</section>

<!-- CUPPING CHART (later) -->
<section class="cupping-section">
  <h2>Cupping Profile (coming)</h2>
</section>

<!-- LOTS -->
<section class="lots-section">
  <h2>Available Microlots</h2>
  <div id="lotsContainer" class="lots-grid"></div>
  <button class="sample-btn">Request Sample</button>
</section>

<script type="module" src="assets/js/farmer.js"></script>
</body>
</html>
