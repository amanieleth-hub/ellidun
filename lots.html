<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin – Add Microlot</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="lots.css"/>
</head>
<body>

<section class="admin-container">
  <h1>Add New Microlot</h1>

  <!-- Farmer Section -->
  <div class="card">
    <h2>Farmer Information</h2>

    <input list="farmerList" id="farmerName" placeholder="Start typing farmer name..." />
    <datalist id="farmerList"></datalist>

    <select id="region">
      <option value="">Select Region</option>
      <option>Guji Uraga</option>
      <option>Guji Dimtu</option>
      <option>Yirgacheffe</option>
      <option>Sidama</option>
    </select>

    <select id="village">
      <option value="">Select Village</option>
    </select>

    <input type="number" id="altitude" placeholder="Altitude" />
    <textarea id="story" placeholder="Farmer Story"></textarea>

    <label>Upload 4 Farmer Images</label>
    <input type="file" id="images" multiple accept="image/*" />
  </div>

  <!-- Lot Section -->
  <div class="card">
    <h2>Microlot Information</h2>

    <input type="text" id="lotId" placeholder="Lot ID"/>
    <input type="text" id="process" placeholder="Process"/>
    <input type="text" id="cupping" placeholder="Cupping Notes"/>
    <input type="number" id="score" placeholder="Score"/>
    <input type="number" id="quantity" placeholder="Quantity (kg)"/>
    <input type="number" id="price" placeholder="Price per kg"/>

    <button id="saveBtn">Save Microlot</button>
  </div>
</section>

<script type="module" src="lotadmin.js"></script>
</body>
</html>
